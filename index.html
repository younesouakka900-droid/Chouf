<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شوف</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap');

  :root{
    --bg:#0b0b0d;
    --bg-elev:#141417;
    --line:#232327;
    --ink:#f2f0eb;
    --ink-dim:#9a978f;
    --accent:#d4a25a;
    --accent-dim:#7a6240;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{scroll-behavior:smooth;}

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }

  /* ===== Header ===== */
  header{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(11,11,13,0.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    padding:22px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .brand{
    font-family:'Cairo', sans-serif;
    font-weight:900;
    font-size:22px;
    letter-spacing:0.5px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .brand .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 12px var(--accent);
  }

  nav{display:flex;gap:28px;}

  nav a{
    color:var(--ink-dim);
    text-decoration:none;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:color .2s;
    position:relative;
    padding-bottom:4px;
  }

  nav a.active, nav a:hover{color:var(--ink);}

  nav a.active::after{
    content:'';
    position:absolute;
    bottom:-2px;left:0;right:0;
    height:2px;
    background:var(--accent);
  }

  /* ===== Hero ===== */
  .hero{
    padding:90px 32px 60px;
    text-align:center;
    border-bottom:1px solid var(--line);
    background:
      radial-gradient(ellipse 60% 80% at 50% 0%, rgba(212,162,90,0.08), transparent);
  }

  .hero-eyebrow{
    font-size:13px;
    color:var(--accent);
    letter-spacing:3px;
    font-weight:600;
    margin-bottom:18px;
    text-transform:uppercase;
  }

  .hero h1{
    font-family:'Cairo', sans-serif;
    font-weight:900;
    font-size:clamp(34px, 6vw, 62px);
    line-height:1.15;
    margin-bottom:18px;
  }

  .hero h1 span{color:var(--accent);}

  .hero p{
    color:var(--ink-dim);
    font-size:17px;
    max-width:480px;
    margin:0 auto;
    line-height:1.7;
  }

  /* ===== Filter bar ===== */
  .filters{
    max-width:1240px;
    margin:0 auto;
    padding:36px 32px 0;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }

  .filter-btn{
    background:var(--bg-elev);
    border:1px solid var(--line);
    color:var(--ink-dim);
    padding:9px 20px;
    border-radius:100px;
    font-family:'Tajawal', sans-serif;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:all .2s;
  }

  .filter-btn:hover{border-color:var(--accent-dim); color:var(--ink);}

  .filter-btn.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#0b0b0d;
    font-weight:700;
  }

  /* ===== Grid ===== */
  .grid-wrap{
    max-width:1240px;
    margin:0 auto;
    padding:32px 32px 100px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:22px;
  }

  .card{
    background:var(--bg-elev);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .25s ease, border-color .25s ease;
    opacity:0;
    animation:rise .5s ease forwards;
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }

  .card:hover{
    transform:translateY(-4px);
    border-color:var(--accent-dim);
  }

  .card-media{
    position:relative;
    width:100%;
    aspect-ratio:16/10;
    background:#000;
    overflow:hidden;
  }

  .card-media img{
    width:100%;height:100%;object-fit:cover;
    transition:transform .4s ease;
  }

  .card:hover .card-media img{transform:scale(1.05);}

  .play-badge{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.55));
  }

  .play-badge svg{
    width:52px;height:52px;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.5));
    opacity:0.92;
    transition:transform .2s;
  }

  .card:hover .play-badge svg{transform:scale(1.12);}

  .type-tag{
    position:absolute;
    top:12px;
    right:12px;
    background:rgba(11,11,13,0.75);
    backdrop-filter:blur(6px);
    color:var(--ink);
    font-size:11px;
    font-weight:700;
    padding:4px 10px;
    border-radius:100px;
    letter-spacing:0.5px;
  }

  .card-body{padding:16px 18px 18px;}

  .card-title{
    font-family:'Cairo', sans-serif;
    font-weight:700;
    font-size:16px;
    margin-bottom:6px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .card-desc{
    color:var(--ink-dim);
    font-size:13px;
    line-height:1.6;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  .card-story{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
    color:var(--ink-dim);
    font-size:13px;
    line-height:1.7;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  .read-more-link{
    display:inline-flex;
    align-items:center;
    gap:5px;
    margin-top:10px;
    color:var(--accent);
    font-size:12.5px;
    font-weight:700;
  }

  .read-more-link svg{width:13px;height:13px;}

  .story-badge{
    position:absolute;
    bottom:12px;
    right:12px;
    background:rgba(11,11,13,0.75);
    backdrop-filter:blur(6px);
    color:var(--accent);
    font-size:11px;
    font-weight:700;
    padding:4px 10px;
    border-radius:100px;
    display:flex;
    align-items:center;
    gap:5px;
  }

  .story-badge svg{width:12px;height:12px;}

  /* ===== Empty state ===== */
  .empty{
    text-align:center;
    padding:100px 20px;
    color:var(--ink-dim);
  }

  .empty svg{width:56px;height:56px;opacity:0.3;margin-bottom:20px;}
  .empty h3{font-family:'Cairo',sans-serif; color:var(--ink); font-size:20px; margin-bottom:8px;}
  .empty p{font-size:14px;}

  /* ===== Lightbox ===== */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(6,6,7,0.94);
    backdrop-filter:blur(8px);
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    animation:fadeIn .25s ease;
  }

  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

  .lightbox.open{display:flex;}

  .lightbox-inner{
    width:100%;
    max-width:980px;
  }

  .lightbox-media{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
  }

  .lightbox-media iframe,
  .lightbox-media video,
  .lightbox-media img{
    width:100%;height:100%;
    border:0;
    object-fit:contain;
    background:#000;
  }

  .lightbox-info{
    padding:22px 4px 0;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
  }

  .lightbox-info h2{
    font-family:'Cairo',sans-serif;
    font-size:20px;
    margin-bottom:6px;
  }

  .lightbox-info p{
    color:var(--ink-dim);
    font-size:14px;
    line-height:1.7;
    max-width:640px;
  }

  .lightbox-story{
    margin-top:14px;
    padding-top:16px;
    border-top:1px solid var(--line);
    color:var(--ink);
    font-size:14.5px;
    line-height:1.9;
    max-width:680px;
    white-space:pre-wrap;
  }

  .lightbox-story.clamped{
    max-height:200px;
    overflow:hidden;
    position:relative;
    mask-image:linear-gradient(180deg, #000 60%, transparent 100%);
    -webkit-mask-image:linear-gradient(180deg, #000 60%, transparent 100%);
  }

  .read-full-btn{
    margin-top:14px;
    background:var(--accent);
    color:#0b0b0d;
    border:none;
    padding:10px 22px;
    border-radius:8px;
    font-family:'Tajawal', sans-serif;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    transition:opacity .2s;
  }

  .read-full-btn:hover{opacity:0.88;}

  .close-btn{
    background:var(--bg-elev);
    border:1px solid var(--line);
    color:var(--ink);
    width:38px;height:38px;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:border-color .2s;
  }

  .close-btn:hover{border-color:var(--accent);}

  footer{
    text-align:center;
    padding:30px;
    color:var(--ink-dim);
    font-size:12.5px;
    border-top:1px solid var(--line);
  }

  @media (max-width:640px){
    header{padding:16px 18px;}
    nav{gap:18px;}
    .hero{padding:60px 18px 40px;}
    .filters{padding:24px 18px 0;}
    .grid-wrap{padding:24px 18px 70px;}
    .grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot"></span>شوف</div>
  <nav>
    <a class="active" data-filter="all">الكل</a>
    <a data-filter="video">فيديوهات</a>
    <a data-filter="image">صور</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-eyebrow">شوف</div>
  <h1>شاهد <span>واقرأ</span> بلا حدود</h1>
  <p>صور وفيديوهات، ومعها القصص والمقالات التي تستحق أن تُروى.</p>
</section>

<div class="filters">
  <button class="filter-btn active" data-filter="all">الكل</button>
  <button class="filter-btn" data-filter="video">فيديوهات</button>
  <button class="filter-btn" data-filter="image">صور</button>
</div>

<div class="grid-wrap">
  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    <h3>لا يوجد محتوى بعد</h3>
    <p>سيظهر المحتوى هنا فور إضافته من لوحة التحكم.</p>
  </div>
</div>

<footer>شوف — جميع الحقوق محفوظة</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <div class="lightbox-media" id="lightboxMedia"></div>
    <div class="lightbox-info">
      <div>
        <h2 id="lightboxTitle"></h2>
        <p id="lightboxDesc"></p>
        <div id="lightboxStoryWrap"></div>
      </div>
      <button class="close-btn" id="closeBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Full Read View -->
<div class="lightbox" id="readView">
  <div class="lightbox-inner" style="max-width:720px;">
    <div class="lightbox-info" style="padding-top:0;">
      <div>
        <h2 id="readTitle" style="font-size:26px; margin-bottom:14px;"></h2>
      </div>
      <button class="close-btn" id="closeReadBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="readStory" class="lightbox-story" style="max-width:100%; border-top:none; padding-top:0; max-height:70vh; overflow-y:auto;"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPOljszrCEz-HZfudoUx3LMMlf-GdSrN0",
    authDomain: "chouf-46d64.firebaseapp.com",
    projectId: "chouf-46d64",
    storageBucket: "chouf-46d64.firebasestorage.app",
    messagingSenderId: "579216991826",
    appId: "1:579216991826:web:6cc30683ecde33f9fa218b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allItems = [];
  let currentFilter = 'all';

  const grid = document.getElementById('grid');
  const emptyState = document.getElementById('emptyState');

  // ===== Helpers to detect embed type =====
  function getYoutubeEmbed(url){
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
    return m ? `https://www.youtube.com/embed/${m[1]}` : null;
  }

  function isDirectVideo(url){
    return /\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(url);
  }

  function isDirectImage(url){
    return /\.(jpg|jpeg|png|gif|webp|avif)(\?.*)?$/i.test(url);
  }

  function buildMediaEl(item, forLightbox){
    const url = item.url;
    const embedMode = item.embedMode || 'auto'; // auto | iframe | video | image

    if(item.type === 'image' || (embedMode==='auto' && isDirectImage(url))){
      const img = document.createElement('img');
      img.src = url;
      img.alt = item.title || '';
      img.loading = 'lazy';
      return img;
    }

    // video logic
    const yt = getYoutubeEmbed(url);
    if(embedMode === 'iframe' || (embedMode==='auto' && (yt || !isDirectVideo(url)))){
      const iframe = document.createElement('iframe');
      iframe.src = yt || url;
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen";
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = "no-referrer-when-downgrade";
      iframe.loading = 'lazy';
      return iframe;
    }

    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    if(!forLightbox) video.muted = true;
    return video;
  }

  function renderGrid(){
    const items = currentFilter === 'all' ? allItems : allItems.filter(i => i.type === currentFilter);
    grid.innerHTML = '';

    if(items.length === 0){
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    items.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (idx * 0.04) + 's';

      const mediaWrap = document.createElement('div');
      mediaWrap.className = 'card-media';

      if(item.type === 'image'){
        const img = document.createElement('img');
        img.src = item.thumbnail || item.url;
        img.alt = item.title || '';
        img.loading = 'lazy';
        mediaWrap.appendChild(img);
      } else {
        const img = document.createElement('img');
        img.src = item.thumbnail || 'https://via.placeholder.com/600x375/141417/9a978f?text=%D9%81%D9%8A%D8%AF%D9%8A%D9%88';
        img.alt = item.title || '';
        img.loading = 'lazy';
        mediaWrap.appendChild(img);

        const badge = document.createElement('div');
        badge.className = 'play-badge';
        badge.innerHTML = `<svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.35)"/><path d="M10 8l6 4-6 4V8z" fill="white"/></svg>`;
        mediaWrap.appendChild(badge);
      }

      const tag = document.createElement('div');
      tag.className = 'type-tag';
      tag.textContent = item.type === 'image' ? 'صورة' : 'فيديو';
      mediaWrap.appendChild(tag);

      if(item.story && item.story.trim().length > 0){
        const storyBadge = document.createElement('div');
        storyBadge.className = 'story-badge';
        storyBadge.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 006.5 22H20V2H6.5A2.5 2.5 0 004 4.5v15z"/></svg>قصة`;
        mediaWrap.appendChild(storyBadge);
      }

      const body = document.createElement('div');
      body.className = 'card-body';
      body.innerHTML = `
        <div class="card-title">${escapeHtml(item.title || 'بدون عنوان')}</div>
        <div class="card-desc">${escapeHtml(item.description || '')}</div>
        ${item.story && item.story.trim().length > 0
          ? `<div class="card-story">${escapeHtml(item.story)}</div>`
          : ''}
      `;

      card.appendChild(mediaWrap);
      card.appendChild(body);
      card.addEventListener('click', () => openLightbox(item));
      grid.appendChild(card);
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ===== Lightbox =====
  const lightbox = document.getElementById('lightbox');
  const lightboxMedia = document.getElementById('lightboxMedia');
  const lightboxTitle = document.getElementById('lightboxTitle');
  const lightboxDesc = document.getElementById('lightboxDesc');
  const lightboxStoryWrap = document.getElementById('lightboxStoryWrap');
  const closeBtn = document.getElementById('closeBtn');

  const readView = document.getElementById('readView');
  const readTitle = document.getElementById('readTitle');
  const readStory = document.getElementById('readStory');
  const closeReadBtn = document.getElementById('closeReadBtn');

  const STORY_INLINE_LIMIT = 400; // chars shown fully inline before truncating

  function openLightbox(item){
    lightboxMedia.innerHTML = '';
    lightboxMedia.appendChild(buildMediaEl(item, true));
    lightboxTitle.textContent = item.title || '';
    lightboxDesc.textContent = item.description || '';

    lightboxStoryWrap.innerHTML = '';
    const story = (item.story || '').trim();
    if(story.length > 0){
      if(story.length <= STORY_INLINE_LIMIT){
        const p = document.createElement('div');
        p.className = 'lightbox-story';
        p.textContent = story;
        lightboxStoryWrap.appendChild(p);
      } else {
        const p = document.createElement('div');
        p.className = 'lightbox-story clamped';
        p.textContent = story;
        lightboxStoryWrap.appendChild(p);

        const btn = document.createElement('button');
        btn.className = 'read-full-btn';
        btn.textContent = 'اقرأ القصة كاملة';
        btn.addEventListener('click', () => openReadView(item));
        lightboxStoryWrap.appendChild(btn);
      }
    }

    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(){
    lightbox.classList.remove('open');
    lightboxMedia.innerHTML = '';
    document.body.style.overflow = '';
  }

  function openReadView(item){
    readTitle.textContent = item.title || '';
    readStory.textContent = item.story || '';
    readView.classList.add('open');
  }

  function closeReadView(){
    readView.classList.remove('open');
  }

  closeBtn.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });

  closeReadBtn.addEventListener('click', closeReadView);
  readView.addEventListener('click', (e) => { if(e.target === readView) closeReadView(); });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape'){
      if(readView.classList.contains('open')) closeReadView();
      else closeLightbox();
    }
  });

  // ===== Filters =====
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('click', () => {
      currentFilter = el.dataset.filter;
      document.querySelectorAll('[data-filter]').forEach(x => x.classList.remove('active'));
      document.querySelectorAll(`[data-filter="${currentFilter}"]`).forEach(x => x.classList.add('active'));
      renderGrid();
    });
  });

  // ===== Load data =====
  async function loadContent(){
    try{
      const q = query(collection(db, 'gallery'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderGrid();
    } catch(err){
      console.error('Error loading content:', err);
      emptyState.style.display = 'block';
      emptyState.querySelector('h3').textContent = 'تعذر تحميل المحتوى';
      emptyState.querySelector('p').textContent = 'تحقق من إعدادات Firebase.';
    }
  }

  loadContent();
</script>

</body>
</html>
